<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Travel Diary · Map</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/map.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌏%3C/text%3E%3C/svg%3E">
</head>
<body>
  <div class="cursor-trail" id="cursor"></div>
  <canvas id="confetti-canvas"></canvas>

  <main class="map-page">
    <header class="map-header">
      <h1>♡ Travel Map <small>足迹地图</small></h1>
      <nav>
        <a href="index.html">home</a>
        <a href="about.html">about</a>
      </nav>
    </header>

    <aside class="city-sidebar win98">
      <div class="win98__titlebar">places we have been<div class="win98__titlebar-buttons"><span>_</span><span>×</span></div></div>
      <div style="padding: 10px;">
        <div class="city-sidebar__title">— click to fly —</div>
        <ul id="city-list"></ul>
        <button class="retro-btn city-sidebar__add" id="add-city-btn" type="button">＋ add city</button>
      </div>
    </aside>

    <!-- 地图舞台 -->
    <div class="globe-stage">
      <!-- 环绕星轨 -->
      <svg class="star-orbit" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid meet">
        <ellipse cx="600" cy="300" rx="560" ry="270" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" stroke-dasharray="8 24"/>
        <ellipse cx="600" cy="300" rx="580" ry="280" fill="none" stroke="rgba(255,200,220,0.18)" stroke-width="0.8" stroke-dasharray="3 30"/>
        <circle r="4" fill="#fff" opacity="0.6">
          <animateMotion dur="30s" repeatCount="indefinite" path="M40,300 a560,270 0 1,1 1120,0 a560,270 0 1,1 -1120,0"/>
        </circle>
        <circle r="3" fill="#ffe0f0" opacity="0.5">
          <animateMotion dur="38s" repeatCount="indefinite" path="M20,300 a580,280 0 1,0 1160,0 a580,280 0 1,0 -1160,0" begin="-10s"/>
        </circle>
        <circle cx="80" cy="80" r="1.5" fill="#fff" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/></circle>
        <circle cx="1080" cy="120" r="1.8" fill="#fff" opacity="0.45"><animate attributeName="opacity" values="0.45;0.1;0.45" dur="3.5s" repeatCount="indefinite"/></circle>
        <circle cx="1050" cy="480" r="1.6" fill="#ffe0f0" opacity="0.45"><animate attributeName="opacity" values="0.45;0.1;0.45" dur="3.2s" repeatCount="indefinite"/></circle>
        <circle cx="150" cy="520" r="1.4" fill="#fff" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.8s" repeatCount="indefinite"/></circle>
      </svg>

      

      <!-- 小王子开飞机，沿地图缓慢飞行 -->
      <img src="assets/stickers/boat.png" class="prince-plane" alt="" aria-hidden="true">

      <!-- 狐狸 -->
      <div class="fox" aria-hidden="true">
        <svg viewBox="0 0 56 64" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="28" cy="36" rx="16" ry="12" fill="#ff8c4a"/>
          <circle cx="28" cy="18" r="12" fill="#ff8c4a"/>
          <path d="M14,14 L8,2 L18,10" fill="#ff8c4a" stroke="#d9a878" stroke-width="0.5"/>
          <path d="M42,14 L48,2 L38,10" fill="#ff8c4a" stroke="#d9a878" stroke-width="0.5"/>
          <path d="M14,14 L8,6 L18,12" fill="#fff5e6"/>
          <path d="M42,14 L48,6 L38,12" fill="#fff5e6"/>
          <circle cx="22" cy="17" r="1.8" fill="#2a1f3d"/>
          <circle cx="34" cy="17" r="1.8" fill="#2a1f3d"/>
          <ellipse cx="28" cy="23" rx="5" ry="3" fill="#fff5e6"/>
          <circle cx="28" cy="22" r="1.5" fill="#2a1f3d"/>
          <ellipse cx="32" cy="38" rx="5" ry="8" fill="#fff5e6"/>
          <path d="M8,36 Q0,20 10,34 Q6,42 12,38" fill="#ff6a1a"/>
          <path d="M8,36 Q4,24 10,34" fill="#fff5e6" opacity="0.4"/>
        </svg>
      </div>

      <!-- 玫瑰 -->
      <div class="rose" aria-hidden="true">
        <svg viewBox="0 0 36 56" xmlns="http://www.w3.org/2000/svg">
          <line x1="18" y1="56" x2="18" y2="22" stroke="#6b8a5a" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M14,44 Q8,40 12,36" fill="none" stroke="#6b8a5a" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M22,40 Q28,36 24,32" fill="none" stroke="#6b8a5a" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="18" cy="16" r="10" fill="#ff5c8d"/>
          <circle cx="12" cy="12" r="7" fill="#ff85ad"/>
          <circle cx="24" cy="12" r="7" fill="#ff85ad"/>
          <circle cx="18" cy="8" r="6" fill="#ffb3d1"/>
          <circle cx="18" cy="18" r="4.5" fill="#d63d6e"/>
        </svg>
      </div>

      <!-- 儿童画笔触平面地图 -->
      <div class="map-flat" id="globe">
        <svg id="map-svg" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
          <g class="graticule" id="graticule"></g>
          <g class="continents" id="continents"></g>
        </svg>
        <div id="city-pins"></div>
      </div>

    </div>
  </main>

  <!-- 弹窗 -->
  <div class="popover-host" id="popover-host">
    <div class="popover" id="popover" hidden>
      <button class="popover__close" id="popover-close">×</button>
      <div class="popover__body" id="popover-body"></div>
      <div class="popover__actions">
        <button class="popover__btn" id="popover-add-photo" type="button">＋ add photo</button>
        <button class="popover__btn popover__btn--danger" id="popover-delete" type="button">✕ delete</button>
      </div>
    </div>
  </div>

  <!-- add city modal -->
  <div class="modal" id="add-city-modal" hidden>
    <div class="win98" style="width: 400px; max-width: 92vw;">
      <div class="win98__titlebar"><span>add a new city</span><div class="win98__titlebar-buttons"><span id="add-city-close">×</span></div></div>
      <div style="padding: 18px;">
        <form id="add-city-form">
          <label>城市名 / city name<input type="text" name="city" required placeholder="e.g. 厦门"></label>
          <label>经度 / longitude (-180 ~ 180)<input type="number" name="lng" required step="0.0001" placeholder="118.0894"></label>
          <label>纬度 / latitude (-90 ~ 90)<input type="number" name="lat" required step="0.0001" placeholder="24.4798"></label>
          <label>日期 / date<input type="text" name="date" placeholder="2025-01"></label>
          <label>封面照片 / cover photo <input type="file" name="file" accept="image/*"></label>
          <label>封面照片描述 / cover note<textarea name="note" rows="3" placeholder="在鼓浪屿吃了一碗沙茶面。"></textarea></label>
          <div style="display:flex; gap: 10px; margin-top: 14px;">
            <button type="submit" class="retro-btn" style="font-size: 1rem; padding: 8px 18px;">save</button>
            <button type="button" class="retro-btn" id="add-city-cancel" style="font-size: 1rem; padding: 8px 18px; background: #eee;">cancel</button>
          </div>
          <div id="add-city-status" style="font-family: var(--font-mono); font-size: 0.8rem; color: var(--ink-soft); margin-top: 8px; min-height: 1.2em;"></div>
        </form>
      </div>
    </div>
  </div>

  <!-- add photo modal -->
  <div class="modal" id="add-photo-modal" hidden>
    <div class="win98" style="width: 400px; max-width: 92vw;">
      <div class="win98__titlebar"><span>add photo to <b id="add-photo-city">city</b></span><div class="win98__titlebar-buttons"><span id="add-photo-close">×</span></div></div>
      <div style="padding: 18px;">
        <form id="add-photo-form">
          <label>选择图片 / choose photo <input type="file" name="file" accept="image/*" required></label>
          <label>照片描述 / photo note <textarea name="note" rows="4" required></textarea></label>
          <div style="display:flex; gap: 10px; margin-top: 14px;">
            <button type="submit" class="retro-btn" style="font-size: 1rem; padding: 8px 18px;">save</button>
            <button type="button" class="retro-btn" id="add-photo-cancel" style="font-size: 1rem; padding: 8px 18px; background: #eee;">cancel</button>
          </div>
          <div id="add-photo-status" style="font-family: var(--font-mono); font-size: 0.8rem; color: var(--ink-soft); margin-top: 8px; min-height: 1.2em;"></div>
        </form>
      </div>
    </div>
  </div>

  <button type="button" class="floating-add-btn floating-add-btn--bottom-left" id="floating-add-city">
    <span class="floating-add-btn__plus">＋</span>add city
  </button>

  <div class="music-player">
    <div class="music-player__panel">
      <button class="music-player__btn" id="music-toggle" title="play / pause">▶</button>
      <div class="music-player__title">now playing<small id="music-name">— nothing yet —</small></div>
    </div>
    <audio id="bgm" loop preload="none"></audio>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="vendor/geo.js"></script>
  <script src="js/cursor.js"></script>
  <script src="js/confetti.js"></script>
  <script src="js/music.js"></script>
  <script src="js/map.js"></script>
</body>
</html>
